<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Calculator body -->
  <rect x="12" y="6" width="40" height="52" rx="4" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Screen -->
  <rect x="18" y="12" width="28" height="12" rx="2" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Row 1 buttons -->
  <rect x="18" y="30" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="29" y="30" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="40" y="30" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Row 2 buttons -->
  <rect x="18" y="40" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="29" y="40" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="40" y="40" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <!-- Row 3 buttons -->
  <rect x="18" y="50" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="29" y="50" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <rect x="40" y="50" width="6" height="6" rx="1" stroke="#1a1a1a" stroke-width="2" fill="none"/>
</svg>
